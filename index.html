<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>

        <!-- Setup Screen -->
        <div id="setup-screen">
            <h2>Game Setup</h2>
            <div class="player-setup">
                <div class="player-input">
                    <label for="player1-name">Player 1 (X):</label>
                    <input type="text" id="player1-name" placeholder="Enter name">
                </div>
                <div class="player-input">
                    <label for="player2-name">Player 2 (O):</label>
                    <select id="player2-type">
                        <option value="human">Human</option>
                        <option value="computer">Computer</option>
                    </select>
                    <input type="text" id="player2-name" placeholder="Enter name">
                </div>
            </div>
            <div class="time-setting">
                <label for="turn-time">Time per turn (seconds):</label>
                <input type="number" id="turn-time" value="15" min="5" max="60">
            </div>
            <button id="start-btn" class="btn">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="game-info">
                <div class="player-info">
                    <span id="current-player"></span>
                    <span id="timer" class="timer"></span>
                </div>
                <div class="piece-count">
                    <span id="x-count"></span>
                    <span id="o-count"></span>
                </div>
                <div id="board-size-info"></div>
            </div>
            <div id="board" class="board"></div>
            <div id="message" class="message"></div>
            <button id="restart-btn" class="btn hidden">Play Again</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
